<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#9be7ff"/>
      <stop offset="100%" stop-color="#6ec6f1"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="100%" height="100%" fill="url(#sky)" rx="80"/>

  <!-- distant clouds -->
  <g fill="#ffffff90">
    <ellipse cx="240" cy="220" rx="120" ry="40" />
    <ellipse cx="420" cy="180" rx="80" ry="30" />
    <ellipse cx="700" cy="240" rx="140" ry="50" />
  </g>

  <!-- pipe (left) -->
  <g transform="translate(120,520)">
    <rect x="0" y="0" width="180" height="380" rx="22" fill="#2f8f3a" filter="url(#shadow)" />
    <rect x="-16" y="-40" width="212" height="64" rx="22" fill="#2f8f3a" />
    <rect x="-6" y="-30" width="192" height="44" rx="18" fill="#3fb44b" />
  </g>

  <!-- coin (top-right) -->
  <g transform="translate(700,200)">
    <circle cx="0" cy="0" r="72" fill="#ffd24d" stroke="#cc9b00" stroke-width="6"/>
    <circle cx="-8" cy="-8" r="30" fill="#fff8c0" opacity="0.65"/>
    <text x="0" y="8" font-size="64" text-anchor="middle" fill="#fff6c8" font-family="serif" font-weight="700">$</text>
  </g>

  <!-- bird (center) -->
  <g transform="translate(520,420)">
    <g filter="url(#shadow)">
      <ellipse cx="0" cy="0" rx="110" ry="78" fill="#ff7b7b" />
    </g>
    <!-- belly -->
    <ellipse cx="-12" cy="10" rx="72" ry="50" fill="#ffd9c0" />
    <!-- eye -->
    <circle cx="28" cy="-10" r="12" fill="#fff" />
    <circle cx="30" cy="-10" r="6" fill="#2b2b2b" />
    <!-- beak -->
    <path d="M70 -2 L110 10 L70 22 Z" fill="#ffb74d" />
    <!-- wing -->
    <path d="M-20 10 C40 20 60 40 20 42 C-10 36 -10 18 -20 10 Z" fill="#ff5a5a" opacity="0.95" />
  </g>

  <!-- rounded mask for favicon shape -->
  <rect x="28" y="28" width="968" height="968" rx="60" fill="none" stroke="#ffffff10"/>
</svg>
